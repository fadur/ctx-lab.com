{{ define "title" }}Field Notes — {{ .Site.Title }}{{ end }}
{{ define "style" }}
  a { color: inherit; }
  .post-link:hover .post-title { opacity: 0.5; }
{{ end }}
{{ define "main" }}
<div style="min-height: 100vh; background: oklch(0.995 0.001 90); color: oklch(0.15 0 0); font-family: 'Newsreader', Georgia, serif; box-sizing: border-box; display: flex; justify-content: center; padding: 6vw 24px;">

  <div style="width: 100%; max-width: 640px;">
    <div style="margin-bottom: 64px;">
      <a href="/" style="font-family: 'JetBrains Mono', monospace; font-size: 13px; color: oklch(0.55 0 0); text-decoration: none;">← ctx-lab.com</a>
    </div>

    <h1 style="font-size: clamp(32px, 5vw, 56px); font-weight: 500; letter-spacing: -0.02em; line-height: 1.1; margin: 0 0 56px 0;">Field Notes.</h1>

    <div style="display: flex; flex-direction: column; gap: 0;">
      {{ range .Pages }}
      <a class="post-link" href="{{ .Permalink }}" style="text-decoration: none; color: inherit; padding: 24px 0; border-top: 1px solid oklch(0.15 0 0 / 0.1); display: flex; justify-content: space-between; align-items: baseline; gap: 24px;">
        <span class="post-title" style="font-size: clamp(17px, 1.8vw, 20px); line-height: 1.3; transition: opacity 0.15s;">{{ .Title }}</span>
        <span style="font-family: 'JetBrains Mono', monospace; font-size: 11px; color: oklch(0.55 0 0); white-space: nowrap; flex-shrink: 0;">{{ .Date.Format "Jan 2006" }}</span>
      </a>
      {{ end }}
      <div style="border-top: 1px solid oklch(0.15 0 0 / 0.1);"></div>
    </div>
  </div>

</div>
{{ end }}
