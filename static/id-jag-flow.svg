<svg width="680" height="180" viewBox="0 0 680 180" xmlns="http://www.w3.org/2000/svg" role="img">
<title>ID-JAG delegation flow</title>
<desc>User sends a request, the IDP issues an ID-JAG delegation token directly, the agent holds only that narrow token, and the resource verifies it without any token being replayable.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<rect x="40" y="80" width="130" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="105" y="98" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#444441">User</text>
<text x="105" y="116" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#5F5E5A">sends request</text>

<line x1="170" y1="108" x2="182" y2="108" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="182" y="80" width="130" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="247" y="98" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">IDP</text>
<text x="247" y="116" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#0F6E56">issues JAG</text>

<line x1="312" y1="108" x2="324" y2="108" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="324" y="80" width="135" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="391" y="98" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">Agent</text>
<text x="391" y="116" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#0F6E56">narrow JAG only</text>

<line x1="459" y1="108" x2="471" y2="108" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="471" y="80" width="160" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="551" y="98" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">Resource</text>
<text x="551" y="116" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#0F6E56">verifies, no token</text>
</svg>
