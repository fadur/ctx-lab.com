<svg viewBox="0 0 760 420" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="none">
  <!-- user question -->
  <text x="40" y="46" fill="#1a1a1a" font-size="13">"revenue by segment, last quarter"</text>
  <line x1="150" y1="56" x2="150" y2="92" stroke="#1a1a1a" stroke-width="1.5"/>
  <path d="M145 86 L150 94 L155 86" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- agent box -->
  <rect x="80" y="96" width="140" height="48" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="150" y="125" fill="#1a1a1a" font-size="13" text-anchor="middle">agent</text>

  <!-- what the model sees: metadata plane -->
  <rect x="300" y="60" width="420" height="130" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="318" y="88" fill="#1a1a1a" font-size="12" font-weight="600">WHAT THE MODEL READS</text>
  <text x="318" y="114" fill="#1a1a1a" font-size="12">revenue := shipped orders − refunds</text>
  <text x="318" y="136" fill="#1a1a1a" font-size="12">Customer —places→ Order —contains→ Product</text>
  <text x="318" y="158" fill="#1a1a1a" font-size="12">valid joins, owners, units, grain</text>
  <text x="318" y="180" fill="#777" font-size="11">definitions and relationships. no rows.</text>

  <!-- agent reads metadata -->
  <line x1="220" y1="110" x2="296" y2="110" stroke="#1a1a1a" stroke-width="1.5"/>
  <path d="M290 105 L298 110 L290 115" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="228" y="100" fill="#777" font-size="11">reads</text>

  <!-- agent writes query -->
  <line x1="150" y1="144" x2="150" y2="238" stroke="#1a1a1a" stroke-width="1.5"/>
  <path d="M145 232 L150 240 L155 232" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="162" y="196" fill="#777" font-size="11">writes one query,</text>
  <text x="162" y="212" fill="#777" font-size="11">on demand</text>

  <!-- data plane -->
  <rect x="80" y="242" width="640" height="110" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="98" y="270" fill="#1a1a1a" font-size="12" font-weight="600">WHAT THE MODEL NEVER NEEDS TO SEE</text>
  <rect x="98" y="286" width="120" height="44" stroke="#1a1a1a" stroke-width="1.2"/>
  <text x="158" y="313" fill="#1a1a1a" font-size="12" text-anchor="middle">warehouse</text>
  <rect x="238" y="286" width="120" height="44" stroke="#1a1a1a" stroke-width="1.2"/>
  <text x="298" y="313" fill="#1a1a1a" font-size="12" text-anchor="middle">databases</text>
  <text x="380" y="305" fill="#777" font-size="12">
    <tspan x="380" dy="0">query executes here,</tspan>
    <tspan x="380" dy="16">under the access controls you already have</tspan>
  </text>

  <!-- result back to user -->
  <line x1="720" y1="297" x2="740" y2="297" stroke="#1a1a1a" stroke-width="0"/>
  <text x="98" y="392" fill="#777" font-size="12">result → rendered as exactly the view the user asked for</text>
</svg>
