<svg viewBox="0 0 760 220" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Adding an OpenAI-compatible provider is standard gateway configuration</title>
  <desc>A simple flow: provider endpoint on the left, standard gateway configuration in the middle, working route on the right.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="36" y="68" width="180" height="76" rx="8" fill="#F1EFE8" stroke="#1a1a1a" stroke-width="1.2"/>
  <text x="126" y="93" text-anchor="middle" fill="#1a1a1a" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" font-weight="600">OpenAI-compatible</text>
  <text x="126" y="113" text-anchor="middle" fill="#1a1a1a" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12">provider</text>
  <text x="126" y="133" text-anchor="middle" fill="#777" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11">e.g. Moonshot</text>

  <line x1="216" y1="106" x2="286" y2="106" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="286" y="48" width="214" height="116" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1.2"/>
  <text x="393" y="74" text-anchor="middle" fill="#712B13" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" font-weight="600">standard gateway config</text>
  <text x="310" y="103" fill="#993C1D" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12">• endpoint</text>
  <text x="310" y="125" fill="#993C1D" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12">• auth</text>
  <text x="310" y="147" fill="#993C1D" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12">• route</text>

  <line x1="500" y1="106" x2="572" y2="106" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="572" y="68" width="152" height="76" rx="8" fill="#F1EFE8" stroke="#1a1a1a" stroke-width="1.2"/>
  <text x="648" y="98" text-anchor="middle" fill="#1a1a1a" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" font-weight="600">works behind the</text>
  <text x="648" y="118" text-anchor="middle" fill="#1a1a1a" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12">same OpenAI API</text>

  <text x="380" y="196" text-anchor="middle" fill="#777" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11">no custom translator, plugin, or fork</text>
</svg>
