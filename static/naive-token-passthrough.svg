<svg width="680" height="180" viewBox="0 0 680 180" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Naive token pass-through across an agent chain</title>
<desc>User sends a request to Agent A, which holds the full token and passes it to Agent B, which uses the same token again to call the API, which cannot tell who actually called it.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<rect x="40" y="80" width="130" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="105" y="98" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#444441">User</text>
<text x="105" y="116" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#5F5E5A">sends request</text>

<line x1="170" y1="108" x2="185" y2="108" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="185" y="80" width="130" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="250" y="98" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#712B13">Agent A</text>
<text x="250" y="116" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#993C1D">holds the token</text>

<line x1="315" y1="108" x2="330" y2="108" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="330" y="80" width="145" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="402" y="98" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#712B13">Agent B</text>
<text x="402" y="116" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#993C1D">same token again</text>

<line x1="475" y1="108" x2="490" y2="108" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="490" y="80" width="130" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="555" y="98" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#444441">API</text>
<text x="555" y="116" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#5F5E5A">no attribution</text>
</svg>
