<svg width="680" height="255" viewBox="0 0 680 255" xmlns="http://www.w3.org/2000/svg" role="img">
<title>What each hop requires in a properly-built multi-agent chain</title>
<desc>Two-hop agent chain showing that between each pair of agents, three things must happen before the next call can be made: an OBO token exchange with the IDP, extending the chain assertion, and generating a DPoP proof. The downstream service must validate all three.</desc>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#993C1D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Main chain -->
<rect x="10" y="44" width="80" height="48" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="50" y="68" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="500" fill="#444441">User</text>

<line x1="90" y1="68" x2="112" y2="68" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="112" y="44" width="110" height="48" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="167" y="68" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="500" fill="#444441">Agent A</text>

<line x1="222" y1="68" x2="328" y2="68" stroke="#993C1D" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow-red)"/>

<rect x="328" y="44" width="110" height="48" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="383" y="68" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="500" fill="#444441">Agent B</text>

<line x1="438" y1="68" x2="548" y2="68" stroke="#993C1D" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow-red)"/>

<rect x="548" y="44" width="122" height="48" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="609" y="61" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="500" fill="#444441">Service</text>
<text x="609" y="79" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="10" fill="#5F5E5A">validates all three</text>

<!-- Hop 1 drop -->
<line x1="275" y1="92" x2="275" y2="118" stroke="#993C1D" stroke-width="1" stroke-dasharray="3 2"/>
<rect x="215" y="118" width="120" height="94" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="275" y="136" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" font-weight="600" fill="#712B13">per hop</text>
<text x="275" y="155" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="10" fill="#993C1D">① OBO exchange → IDP</text>
<text x="275" y="172" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="10" fill="#993C1D">② extend chain assertion</text>
<text x="275" y="189" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="10" fill="#993C1D">③ DPoP proof generation</text>

<!-- Hop 2 drop -->
<line x1="493" y1="92" x2="493" y2="118" stroke="#993C1D" stroke-width="1" stroke-dasharray="3 2"/>
<rect x="433" y="118" width="120" height="94" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="493" y="136" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" font-weight="600" fill="#712B13">per hop</text>
<text x="493" y="155" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="10" fill="#993C1D">① OBO exchange → IDP</text>
<text x="493" y="172" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="10" fill="#993C1D">② extend chain assertion</text>
<text x="493" y="189" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="10" fill="#993C1D">③ DPoP proof generation</text>

<text x="340" y="236" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5F5E5A">repeats at every hop — plus chain validation logic at every downstream service</text>
</svg>
