<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" font-family="ui-monospace, 'JetBrains Mono', monospace">
  <rect width="900" height="260" fill="#ffffff"/>

  <!-- Session A -->
  <rect x="30" y="80" width="200" height="100" rx="6" fill="#ffffff" stroke="#18181b" stroke-width="1.5"/>
  <text x="130" y="120" text-anchor="middle" font-size="15" fill="#18181b" font-weight="600">Session A</text>
  <text x="130" y="145" text-anchor="middle" font-size="12" fill="#71717a">does the work</text>

  <!-- arrow A to file -->
  <line x1="230" y1="130" x2="330" y2="130" stroke="#a1a1aa" stroke-width="1.5"/>
  <polygon points="330,130 320,125 320,135" fill="#a1a1aa"/>

  <!-- Handoff file -->
  <rect x="340" y="60" width="220" height="140" rx="6" fill="#fafaf9" stroke="#4f46e5" stroke-width="2"/>
  <text x="450" y="95" text-anchor="middle" font-size="13" fill="#4f46e5" font-weight="700">handoff file</text>
  <line x1="365" y1="112" x2="535" y2="112" stroke="#d4d4d8" stroke-width="1"/>
  <text x="450" y="132" text-anchor="middle" font-size="11" fill="#3f3f46">what's done</text>
  <text x="450" y="152" text-anchor="middle" font-size="11" fill="#3f3f46">what's next</text>
  <text x="450" y="172" text-anchor="middle" font-size="11" fill="#3f3f46">constraints that still apply</text>

  <!-- arrow file to B -->
  <line x1="560" y1="130" x2="660" y2="130" stroke="#a1a1aa" stroke-width="1.5"/>
  <polygon points="660,130 650,125 650,135" fill="#a1a1aa"/>

  <!-- Session B -->
  <rect x="670" y="80" width="200" height="100" rx="6" fill="#ffffff" stroke="#18181b" stroke-width="1.5"/>
  <text x="770" y="120" text-anchor="middle" font-size="15" fill="#18181b" font-weight="600">Session B</text>
  <text x="770" y="145" text-anchor="middle" font-size="12" fill="#71717a">cold start</text>

  <!-- annotations below -->
  <text x="130" y="215" text-anchor="middle" font-size="11" fill="#dc2626">context dies here</text>
  <text x="450" y="228" text-anchor="middle" font-size="11" fill="#4f46e5">only this survives</text>
  <text x="770" y="215" text-anchor="middle" font-size="11" fill="#71717a">no memory of A</text>
</svg>
