<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" font-family="ui-monospace, 'JetBrains Mono', monospace">
  <rect width="900" height="300" fill="#ffffff"/>

  <!-- Agent -->
  <rect x="40" y="110" width="170" height="90" rx="6" fill="#ffffff" stroke="#18181b" stroke-width="1.5"/>
  <text x="125" y="150" text-anchor="middle" font-size="15" fill="#18181b" font-weight="600">Agent</text>
  <text x="125" y="172" text-anchor="middle" font-size="11" fill="#71717a">unit of work</text>

  <!-- arrow to inbox -->
  <line x1="210" y1="155" x2="320" y2="155" stroke="#a1a1aa" stroke-width="1.5"/>
  <polygon points="320,155 310,150 310,160" fill="#a1a1aa"/>
  <text x="265" y="140" text-anchor="middle" font-size="10" fill="#71717a">reports back</text>

  <!-- Inbox -->
  <rect x="330" y="90" width="200" height="130" rx="6" fill="#fafaf9" stroke="#4f46e5" stroke-width="2"/>
  <text x="430" y="125" text-anchor="middle" font-size="14" fill="#4f46e5" font-weight="700">Inbox</text>
  <text x="430" y="150" text-anchor="middle" font-size="11" fill="#3f3f46">interrupt payload</text>
  <text x="430" y="168" text-anchor="middle" font-size="11" fill="#3f3f46">waits, no time limit</text>

  <!-- arrow to human -->
  <line x1="530" y1="155" x2="640" y2="155" stroke="#a1a1aa" stroke-width="1.5"/>
  <polygon points="640,155 630,150 630,160" fill="#a1a1aa"/>

  <!-- Human decision -->
  <rect x="650" y="90" width="210" height="130" rx="6" fill="#ffffff" stroke="#18181b" stroke-width="1.5"/>
  <text x="755" y="118" text-anchor="middle" font-size="14" fill="#18181b" font-weight="600">Human</text>
  <text x="755" y="145" text-anchor="middle" font-size="11" fill="#3f3f46">accept</text>
  <text x="755" y="165" text-anchor="middle" font-size="11" fill="#3f3f46">reject</text>
  <text x="755" y="185" text-anchor="middle" font-size="11" fill="#3f3f46">steer</text>

  <!-- return arrow, curved, back to Agent -->
  <path d="M 755 220 C 755 270, 125 270, 125 220" fill="none" stroke="#a1a1aa" stroke-width="1.5"/>
  <polygon points="125,220 120,208 132,210" fill="#a1a1aa"/>
  <text x="440" y="262" text-anchor="middle" font-size="11" fill="#71717a">new run, resume keyed to interruptId</text>
</svg>
